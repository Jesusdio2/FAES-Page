<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Texto</title>

  <style>
    @font-face {
      font-family: 'Product Sans';
      src: url('ProductSans-Regular.ttf') format('truetype');
    }

    body {
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
    }

    .texto {
      font-family: 'Product Sans', sans-serif;
      font-size: 80px;
      font-weight: bold;
    }

    .azul   { color: #4285F4; }
    .rojo   { color: #EA4335; }
    .amarillo { color: #FBBC05; }
    .verde  { color: #34A853; }
  </style>
</head>

<body>
  <div class="texto">
    <span class="azul">G</span>
    <span class="rojo">o</span>
    <span class="amarillo">o</span>
    <span class="azul">g</span>
    <span class="verde">l</span>
    <span class="rojo">e</span>
  </div>
</body>
</html>
